repos:
  - repo: local
    hooks:
      - id: generate-mxl
        name: Regenerate .mxl files when a model changes
        entry: npm run generate:mxl
        language: system
        files: (^|/)model\.ts$
        pass_filenames: false
        stages: [pre-commit]
      - id: build
        name: Check whether the build succeeds
        entry: npm run build
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: ci-local
        name: Emulate the GitHub deploy build (container, clean install)
        entry: bash scripts/ci-local.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
